<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add User</title>
</head>
<body>
<h1>Добавление пользователя</h1>
<form action="/admin/add" method="post" th:object="${user}">
    <label>Имя:</label>
    <input type="text" th:field="*{name}" />
    <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red"></span>
    <br/>

    <label>Email:</label>
    <input type="text" th:field="*{email}" />
    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color:red"></span>
    <br/>

    <label>Пароль:</label>
    <input type="password" th:field="*{password}" />
    <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color:red"></span>
    <br/>

    <label>Роли:</label>
    <select multiple name="roleIds">
        <option th:each="role : ${allRoles}" th:value="${role.id}" th:text="${role.name}"/>
    </select>
    <br/>

    <button type="submit">Сохранить</button>
</form>
<br/>
<a href="/admin">Назад к списку</a>
</body>
</html>
