<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- CSRF мета-теги (для POST, PUT, DELETE) -->
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Admin Panel</h1>
        <form action="/logout" method="post">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>

    <div class="mb-3">
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddModal()">Add User</button>
    </div>

    <table class="table table-bordered table-striped" id="usersTable">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
            <th>Email</th>
            <th>Roles</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody id="usersTableBody">
        </tbody>
    </table>
</div>

<div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Add User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label for="name" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                    <div class="mb-3">
                        <label for="age" class="form-label">Age</label>
                        <input type="number" class="form-control" id="age" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password">
                        <small class="text-muted" id="passwordHint" style="display: none;">Leave blank to keep current password</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Roles</label>
                        <div id="rolesCheckboxes"></div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">Save</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    let allRoles = [];

    window.onload = () => {
        loadRoles();
        loadUsers();
    };

    async function loadRoles() {
        const response = await fetch('/api/users/roles');
        allRoles = await response.json();
        renderRolesCheckboxes([]);
    }

    function renderRolesCheckboxes(selectedRoleIds) {
        const container = document.getElementById('rolesCheckboxes');
        container.innerHTML = '';
        allRoles.forEach(role => {
            const isChecked = selectedRoleIds.includes(role.id);
            container.innerHTML += `
                <div class="form-check">
                    <input type="checkbox" class="form-check-input" value="${role.id}" id="role_${role.id}" ${isChecked ? 'checked' : ''}>
                    <label class="form-check-label" for="role_${role.id}">${role.name.replace('ROLE_', '')}</label>
                </div>
            `;
        });
    }

    function getSelectedRoleIds() {
        const checkboxes = document.querySelectorAll('#rolesCheckboxes input:checked');
        return Array.from(checkboxes).map(cb => parseInt(cb.value));
    }

    async function loadUsers() {
        const response = await fetch('/api/users');
        const users = await response.json();
        renderUsersTable(users);
    }

    function renderUsersTable(users) {
        const tbody = document.getElementById('usersTableBody');
        tbody.innerHTML = '';
        for (const user of users) {
            const rolesText = user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');
            const row = `
                <tr>
                    <td>${user.id}</td>
                    <td>${escapeHtml(user.name)}</td>
                    <td>${escapeHtml(user.lastName || '')}</td>
                    <td>${user.age || ''}</td>
                    <td>${escapeHtml(user.email)}</td>
                    <td>${escapeHtml(rolesText)}</td>
                    <td>
                        <button class="btn btn-warning btn-sm" onclick="openEditModal(${user.id})">Edit</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        }
    }

    function openAddModal() {
        document.getElementById('modalTitle').innerText = 'Add User';
        document.getElementById('userId').value = '';
        document.getElementById('name').value = '';
        document.getElementById('lastName').value = '';
        document.getElementById('age').value = '';
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('passwordHint').style.display = 'none';
        renderRolesCheckboxes([]);
        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    async function openEditModal(id) {
        const response = await fetch(`/api/users/${id}`);
        const user = await response.json();

        document.getElementById('modalTitle').innerText = 'Edit User';
        document.getElementById('userId').value = user.id;
        document.getElementById('name').value = user.name;
        document.getElementById('lastName').value = user.lastName || '';
        document.getElementById('age').value = user.age || '';
        document.getElementById('email').value = user.email;
        document.getElementById('password').value = '';
        document.getElementById('passwordHint').style.display = 'block';

        const selectedRoleIds = user.roles.map(r => r.id);
        renderRolesCheckboxes(selectedRoleIds);

        new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    async function saveUser() {
        const id = document.getElementById('userId').value;
        const user = {
            name: document.getElementById('name').value,
            lastName: document.getElementById('lastName').value,
            age: parseInt(document.getElementById('age').value),
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
        };

        const roleIds = getSelectedRoleIds();
        const url = id ? `/api/users/${id}` : '/api/users';
        const method = id ? 'PUT' : 'POST';

        const params = new URLSearchParams();
        roleIds.forEach(rid => params.append('roleIds', rid));

        const response = await fetch(`${url}?${params.toString()}`, {
            method: method,
            headers: {
                'Content-Type': 'application/json',
                [csrfHeader]: csrfToken
            },
            body: JSON.stringify(user)
        });

        if (response.ok) {
            bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
            await loadUsers();
        } else {
            alert('Error saving user');
        }
    }

    async function deleteUser(id) {
        if (confirm('Are you sure?')) {
            await fetch(`/api/users/${id}`, {
                method: 'DELETE',
                headers: {
                    [csrfHeader]: csrfToken
                }
            });
            await loadUsers();
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
</html>
