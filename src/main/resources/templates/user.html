<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>User Profile</h1>
        <form action="/logout" method="post">
            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
            <button type="submit" class="btn btn-danger">Logout</button>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <h5 class="mb-0">Your Information</h5>
        </div>
        <div class="card-body">
            <table class="table table-bordered" id="userTable">
                <tbody id="userTableBody">
                <tr><th>ID</th><td id="userId">-</td></tr>
                <tr><th>First Name</th><td id="userName">-</td></tr>
                <tr><th>Last Name</th><td id="userLastName">-</td></tr>
                <tr><th>Age</th><td id="userAge">-</td></tr>
                <tr><th>Email</th><td id="userEmail">-</td></tr>
                <tr><th>Roles</th><td id="userRoles">-</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
    const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

    window.onload = () => {
        loadCurrentUser();
    };

    async function loadCurrentUser() {
        try {
            const response = await fetch('/api/users/current', {
                headers: {
                    [csrfHeader]: csrfToken
                }
            });
            if (response.ok) {
                const user = await response.json();
                document.getElementById('userId').innerText = user.id;
                document.getElementById('userName').innerText = user.name;
                document.getElementById('userLastName').innerText = user.lastName || '';
                document.getElementById('userAge').innerText = user.age || '';
                document.getElementById('userEmail').innerText = user.email;
                const rolesText = user.roles.map(r => r.name.replace('ROLE_', '')).join(', ');
                document.getElementById('userRoles').innerText = rolesText;
            } else {
                console.error('Failed to load user');
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }
</script>
</body>
</html>
